services:
  postgres:
    image: postgres:16-alpine
    container_name: repitch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: repitch-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sftp:
    image: atmoz/sftp:alpine
    container_name: repitch-sftp
    restart: unless-stopped
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      - ./sftp/upload:/home/${SFTP_USER}/upload
      - ./sftp/outbox:/home/${SFTP_USER}/outbox
      - ./sftp/archive:/home/${SFTP_USER}/archive
    command: "${SFTP_USER}:${SFTP_PASSWORD}:1001"

volumes:
  postgres_data:
  redis_data:
